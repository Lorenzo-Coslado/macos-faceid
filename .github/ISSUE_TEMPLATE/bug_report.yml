name: 🐛 Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: I enabled Face ID for sudo, then `sudo` always asks for the password…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "15.5 (Apple Silicon)"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How did you install it?
      options:
        - Downloaded the .dmg
        - Built from source
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Daemon log (if relevant)
      description: "Paste the last lines of `~/Library/Application Support/faceid/logs/daemon.log`"
      render: shell
