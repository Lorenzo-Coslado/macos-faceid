<svg xmlns="http://www.w3.org/2000/svg" width="900" height="330" viewBox="0 0 900 330" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6472"/>
    </marker>
    <marker id="arrowg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f9e44"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0b1220" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="898" height="328" rx="14" fill="#ffffff" stroke="#e5e9f0"/>

  <!-- boxes -->
  <g filter="url(#sh)">
    <rect x="34" y="132" width="112" height="66" rx="8" fill="#eef2ff" stroke="#4b5563" stroke-width="1.5"/>
    <rect x="212" y="122" width="176" height="86" rx="8" fill="#f8fafc" stroke="#4b5563" stroke-width="1.5"/>
    <rect x="452" y="122" width="168" height="86" rx="8" fill="#ecfdf5" stroke="#4b5563" stroke-width="1.5"/>
    <rect x="700" y="44"  width="164" height="60" rx="8" fill="#f8fafc" stroke="#4b5563" stroke-width="1.5"/>
    <rect x="700" y="214" width="164" height="72" rx="8" fill="#f8fafc" stroke="#4b5563" stroke-width="1.5"/>
  </g>

  <!-- box labels -->
  <text x="90"  y="171" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">sudo</text>

  <text x="300" y="152" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">PAM module</text>
  <text x="300" y="173" text-anchor="middle" font-size="12.5" fill="#6b7280" font-family="ui-monospace, Menlo, monospace">pam_faceid.so</text>
  <text x="300" y="192" text-anchor="middle" font-size="11.5" fill="#9ca3af">runs as root</text>

  <text x="536" y="152" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">Daemon</text>
  <text x="536" y="173" text-anchor="middle" font-size="12.5" fill="#6b7280">your login session</text>
  <text x="536" y="192" text-anchor="middle" font-size="11.5" fill="#9ca3af">owns the camera</text>

  <text x="782" y="70"  text-anchor="middle" font-size="14" font-weight="700" fill="#1f2937">Webcam</text>
  <text x="782" y="90"  text-anchor="middle" font-size="11.5" fill="#9ca3af">RGB frames</text>

  <text x="782" y="243" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2937">Recognition</text>
  <text x="782" y="263" text-anchor="middle" font-size="12" fill="#6b7280">YuNet + SFace</text>
  <text x="782" y="279" text-anchor="middle" font-size="11.5" fill="#9ca3af">cosine match</text>

  <!-- arrows -->
  <line x1="146" y1="165" x2="206" y2="165" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="176" y="156" text-anchor="middle" font-size="11.5" fill="#5b6472">1</text>

  <line x1="388" y1="165" x2="446" y2="165" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="417" y="150" text-anchor="middle" font-size="11" fill="#5b6472">2 · socket</text>

  <line x1="620" y1="150" x2="695" y2="82"  stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="648" y="108" text-anchor="middle" font-size="11" fill="#5b6472">3 · capture</text>

  <line x1="620" y1="180" x2="695" y2="242" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="648" y="222" text-anchor="middle" font-size="11" fill="#5b6472">4 · match</text>

  <!-- return: result -->
  <path d="M452 200 C 360 262, 220 262, 146 190" fill="none" stroke="#2f9e44" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowg)"/>
  <text x="300" y="278" text-anchor="middle" font-size="12" font-weight="600" fill="#2f9e44">OK unlocks · FAIL falls back to password</text>

  <text x="450" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#374151" letter-spacing="0.5">HOW A sudo IS UNLOCKED BY YOUR FACE</text>
</svg>
